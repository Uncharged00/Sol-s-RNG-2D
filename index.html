<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
body{background:#08081A;overflow:hidden;font-family:'Courier New',monospace;touch-action:manipulation;}
canvas{display:block;position:fixed;top:0;left:0;}
#hud{position:fixed;top:0;left:0;right:0;padding:8px;display:flex;justify-content:space-between;align-items:flex-start;gap:6px;z-index:10;pointer-events:none;}#hud button{pointer-events:all;}
.hud-box{background:rgba(0,0,8,0.75);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:5px 8px;font-size:10px;color:#888;flex:1;text-align:center;backdrop-filter:blur(4px);}
.hud-box b{display:block;color:#fff;font-size:14px;line-height:1.2;}
#biome-bar{position:fixed;top:84px;left:50%;transform:translateX(-50%);background:rgba(0,0,8,0.8);border-radius:20px;padding:4px 14px;font-size:11px;color:#aaa;z-index:10;pointer-events:none;border:1px solid rgba(255,255,255,0.15);white-space:nowrap;backdrop-filter:blur(4px);}
#aura-display{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:5;pointer-events:none;margin-top:80px;}
#aura-name{font-size:20px;font-weight:bold;letter-spacing:2px;text-shadow:0 0 20px currentColor;transition:all .3s;word-break:break-word;max-width:90vw;opacity:1;}
#aura-sub{font-size:12px;color:#666;margin-top:4px;letter-spacing:3px;}
#aura-tier{font-size:11px;margin-bottom:6px;letter-spacing:4px;}
#bonus-tag{font-size:13px;color:#ffd700;margin-top:6px;opacity:0;transition:opacity .3s;}
#coolbar-wrap{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);width:60vw;z-index:10;pointer-events:none;}
#coolbar-bg{height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;}
#coolbar-fill{height:100%;width:100%;background:linear-gradient(90deg,#2040bb,#40a0ff);border-radius:3px;transition:width .05s linear;}
#potion-bar{display:none;} /* replaced by buff-tray */
#buff-tray{position:fixed;bottom:74px;left:8px;display:flex;flex-direction:column;gap:4px;z-index:15;pointer-events:none;max-width:160px;}
#roll-chat{position:fixed;top:84px;right:8px;width:220px;bottom:74px;z-index:14;pointer-events:none;display:flex;flex-direction:column;gap:4px;overflow:hidden;background:rgba(0,0,10,0.55);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:8px 6px;}
#roll-chat-title{font-size:9px;color:#444;letter-spacing:3px;text-align:center;padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;}
.chat-entry{background:rgba(255,255,255,0.04);border-radius:8px;padding:7px 10px;font-size:12px;border-left:4px solid #555;line-height:1.5;opacity:1;transition:opacity 0.6s ease;flex-shrink:0;}
.buff-icon{display:flex;align-items:center;gap:5px;background:rgba(0,0,14,0.82);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:4px 7px;backdrop-filter:blur(4px);}
.buff-emoji{font-size:14px;line-height:1;}
.buff-info{display:flex;flex-direction:column;}
.buff-name{font-size:9px;color:#ccc;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100px;}
.buff-timer{font-size:9px;font-weight:bold;line-height:1.2;}
#buttons{position:fixed;bottom:0;left:0;right:0;display:flex;gap:5px;padding:6px 6px 8px;z-index:20;}
.btn{flex:1;padding:12px 2px;border:none;border-radius:10px;font-family:'Courier New',monospace;font-size:10px;font-weight:bold;cursor:pointer;letter-spacing:0.5px;transition:transform .1s,filter .15s;-webkit-appearance:none;}
.btn:active{transform:scale(.93);filter:brightness(1.4);}
#btn-roll{background:linear-gradient(145deg,#0d2060,#1a40cc);color:#80b8ff;border:1px solid #2050cc;}
#btn-shop{background:linear-gradient(145deg,#200d50,#5020aa);color:#c080ff;border:1px solid #7030dd;}
#btn-inv{background:linear-gradient(145deg,#0d2a18,#1a8840);color:#60e880;border:1px solid #20aa50;}
#toast{position:fixed;top:100px;left:50%;transform:translateX(-50%);background:rgba(0,0,16,0.95);color:#fff;padding:10px 18px;border-radius:10px;font-size:12px;pointer-events:none;opacity:0;transition:opacity .3s;z-index:300;border:1px solid rgba(255,255,255,0.2);text-align:center;max-width:80vw;backdrop-filter:blur(8px);}

/* OVERLAY */
#overlay{position:fixed;inset:0;background:rgba(0,0,12,0.92);display:none;flex-direction:column;align-items:stretch;z-index:200;overflow:hidden;backdrop-filter:blur(8px);}
#overlay.open{display:flex;}
#overlay-header{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.1);flex-shrink:0;}
#overlay-title{color:#ffd700;font-size:16px;font-weight:bold;letter-spacing:3px;flex:1;}
#close-overlay{background:rgba(255,255,255,0.1);color:#fff;border:none;border-radius:50%;width:34px;height:34px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
#tab-bar{display:flex;gap:6px;padding:10px 12px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.08);}
.tab-btn{flex:1;padding:8px 4px;border:1px solid rgba(255,255,255,0.15);border-radius:8px;background:transparent;color:#888;font-family:'Courier New',monospace;font-size:10px;cursor:pointer;transition:all .2s;}
.tab-btn.active{background:rgba(255,255,255,0.12);color:#fff;border-color:rgba(255,255,255,0.3);}
#overlay-scroll{flex:1;overflow-y:auto;padding:10px 12px;-webkit-overflow-scrolling:touch;}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.card{background:rgba(255,255,255,0.04);border-radius:10px;padding:10px;border:1px solid rgba(255,255,255,0.08);cursor:pointer;transition:background .15s,border-color .15s;position:relative;}
.card:active{background:rgba(255,255,255,0.12);}
.card-name{font-weight:bold;font-size:12px;margin-bottom:3px;line-height:1.3;}
.card-sub{font-size:10px;color:#777;line-height:1.4;}
.card-cost{font-size:11px;color:#ffd700;margin-top:6px;}
.owned-tag{position:absolute;top:6px;right:6px;background:rgba(60,200,60,0.2);color:#60ff60;font-size:9px;padding:2px 5px;border-radius:4px;border:1px solid rgba(60,200,60,0.3);}
.aura-count{display:inline-block;background:rgba(255,255,255,0.1);color:#ccc;font-size:10px;padding:2px 6px;border-radius:4px;margin-top:4px;}
.tier-label{font-size:10px;margin-bottom:2px;letter-spacing:2px;}
.empty-msg{color:#555;text-align:center;padding:50px 20px;font-size:13px;grid-column:1/-1;}

/* CUTSCENE */
#cutscene{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:400;background:#000;}
#cutscene.active{display:flex;}
#cs-canvas{position:absolute;inset:0;pointer-events:none;}
#cs-text{position:relative;z-index:2;text-align:center;padding:20px;transition:opacity .5s;}
#cs-flash{position:fixed;inset:0;z-index:500;pointer-events:none;opacity:0;background:#fff;}
#equipped-aura-badge{position:fixed;bottom:74px;right:10px;background:rgba(0,0,12,0.88);border:1px solid rgba(255,255,255,0.12);border-radius:9px;padding:5px 9px;font-size:9px;color:#777;z-index:10;pointer-events:none;max-width:130px;text-align:right;backdrop-filter:blur(4px);display:none;}
#equipped-aura-badge .eb-label{font-size:8px;color:#555;letter-spacing:2px;}
#equipped-aura-badge .eb-name{font-size:11px;font-weight:bold;display:block;margin-top:1px;}
</style>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  SUPABASE AUTH
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const SUPABASE_URL="https://nuesftiqwqrlofiexhmz.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51ZXNmdGlxd3FybG9maWV4aG16Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTIxNjIsImV4cCI6MjA4OTQ4ODE2Mn0.Of6JQNGHtVqZAmYQEowT_u9OTBi25o-jAOo8yeE85bs";
let sbClient=null,sbUser=null,sbLoadedOnce=false,_sbJustSignedIn=false;

function initSupabase(){
  try{
    const sb=window.supabase||window.Supabase;
    if(!sb){
      console.error("Supabase library not loaded");
      setTimeout(initSupabase,1000); // retry after 1s
      return;
    }
    sbClient=sb.createClient(SUPABASE_URL,SUPABASE_KEY);
    sbClient.auth.onAuthStateChange((event,session)=>{
      sbUser=session?.user||null;
      updateAuthUI();
      // TOKEN_REFRESHED / INITIAL_SESSION / USER_UPDATED all fire on foreground — ignore them
      // Only act on explicit password sign-in
      if(event==="SIGNED_IN"&&!sbLoadedOnce&&_sbJustSignedIn){
        _sbJustSignedIn=false;
        sbLoadedOnce=true;
        loadCloudSave();
        toast("☁️ Signed in as "+sbUser.email);
      }
      if(event==="SIGNED_OUT"){sbLoadedOnce=false;_sbJustSignedIn=false;toast("👋 Signed out");}
    });
    sbClient.auth.getSession().then(({data:{session}})=>{
      sbUser=session?.user||null;
      updateAuthUI();
      // Load once on startup if already signed in
      if(sbUser&&!sbLoadedOnce){
        sbLoadedOnce=true;
        loadCloudSave();
      }
    });
    console.log("✓ Supabase connected");
  }catch(e){
    console.error("Supabase init error:",e.message);
    toast("❌ Auth error: "+e.message);
  }
}

async function authSignUp(email,password){
  if(!sbClient) return toast("❌ Supabase not configured");
  const {error}=await sbClient.auth.signUp({email,password});
  if(error) toast("❌ "+error.message);
  else toast("✅ Account created! Check email to confirm.");
}

function _doSignIn(){const e=document.getElementById("auth-email"),p=document.getElementById("auth-pass");if(e&&p)authSignIn(e.value,p.value);}
function _doSignUp(){const e=document.getElementById("auth-email"),p=document.getElementById("auth-pass");if(e&&p)authSignUp(e.value,p.value);}

async function authSignIn(email,password){
  if(!sbClient) return toast("❌ Supabase not configured");
  _sbJustSignedIn=true; // flag so onAuthStateChange knows this is a real sign-in
  const {error}=await sbClient.auth.signInWithPassword({email,password});
  if(error){_sbJustSignedIn=false;toast("❌ "+error.message);}
  else{document.getElementById("overlay").classList.remove("open");}
}

async function authSignOut(){
  if(!sbClient) return;
  await sbClient.auth.signOut();
  updateAuthUI();
}

async function saveCloudSave(silent=false){
  if(!sbClient||!sbUser){ if(!silent) toast("❌ Not signed in"); return; }
  const d=JSON.stringify({
    coins:S.coins,rolls:S.rolls,owned_auras:S.owned_auras,owned_items:S.owned_items,
    owned_gears:S.owned_gears,owned_talismans:S.owned_talismans,
    equipped_aura:S.equipped_aura,equipped_R:S.equipped_R,equipped_L:S.equipped_L,
    equipped_talisman:S.equipped_talisman,collection:S.collection,
    companions:S.companions,equipped_companion:S.equipped_companion,
    roulette_tickets:S.roulette_tickets,active_potions:S.active_potions,
    isDay:S.isDay,dayNightTimer:S.dayNightTimer,chatMinChance:S.chatMinChance,
    autoDelete:S.autoDelete,autoEquip:S.autoEquip,talisman_stacks:S.talisman_stacks,
  });
  const {error}=await sbClient.from("saves").upsert({user_id:sbUser.id,save_data:d,updated_at:new Date().toISOString()},{onConflict:"user_id"});
  if(error){ if(!silent) toast("❌ Cloud save failed: "+error.message); }
  else {
    if(!silent) toast("☁️ Progress saved to cloud!");
    else {
      // Subtle flash on coins box for auto-save
      const hc=document.getElementById("hud-coins");
      if(hc){ hc.style.color="#60e880"; setTimeout(()=>hc.style.color="",800); }
    }
  }
}

async function loadCloudSave(){
  if(!sbClient||!sbUser) return;
  const {data,error}=await sbClient.from("saves").select("save_data").eq("user_id",sbUser.id).single();
  if(error||!data) return;
  try{
    const d=JSON.parse(data.save_data);
    Object.assign(S,d);
    updateHUD();updateBiomeBar();updateEquippedBadge();updateAuraDisplay();updateCompanion();
    toast("☁️ Progress loaded from cloud!");
  }catch(e){toast("❌ Failed to load cloud save");}
}

function updateAuthUI(){
  const el=document.getElementById("auth-status");
  if(!el) return;
  if(sbUser){
    el.innerHTML=
      "<div style='color:#60e880;font-size:11px;font-weight:bold'>✅ "+sbUser.email+"</div>"+
      "<div style='display:flex;gap:6px;margin-top:6px'>"+
      "<button onclick='saveCloudSave()' style='flex:1;padding:7px;background:rgba(0,200,100,0.15);border:1px solid rgba(0,200,100,0.3);border-radius:7px;color:#60e880;font-family:inherit;font-size:10px;cursor:pointer'>☁️ Save</button>"+
      "<button onclick='loadCloudSave()' style='flex:1;padding:7px;background:rgba(0,150,255,0.15);border:1px solid rgba(0,150,255,0.3);border-radius:7px;color:#60aaff;font-family:inherit;font-size:10px;cursor:pointer'>⬇️ Load</button>"+
      "<button onclick='authSignOut()' style='flex:1;padding:7px;background:rgba(255,80,80,0.12);border:1px solid rgba(255,80,80,0.25);border-radius:7px;color:#ff8080;font-family:inherit;font-size:10px;cursor:pointer'>Sign Out</button>"+
      "</div>";
  }else{
    el.innerHTML=
      "<div style='display:flex;flex-direction:column;gap:6px'>"+
      "<input id='auth-email' type='email' placeholder='Email' style='padding:7px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:7px;color:#fff;font-family:inherit;font-size:11px;outline:none'/>"+
      "<input id='auth-pass' type='password' placeholder='Password' style='padding:7px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:7px;color:#fff;font-family:inherit;font-size:11px;outline:none'/>"+
      "<div style='display:flex;gap:6px'>"+
      "<button onclick='_doSignIn()' style='flex:1;padding:7px;background:rgba(100,200,100,0.15);border:1px solid rgba(100,200,100,0.3);border-radius:7px;color:#80e880;font-family:inherit;font-size:10px;cursor:pointer'>Sign In</button>"+
      "<button onclick='_doSignUp()' style='flex:1;padding:7px;background:rgba(100,100,255,0.12);border:1px solid rgba(100,100,255,0.25);border-radius:7px;color:#8888ff;font-family:inherit;font-size:10px;cursor:pointer'>Sign Up</button>"+
      "</div></div>";
  }
}

//  CANVAS

// Stars
const STARS=Array.from({length:80},()=>({x:rnd(),y:rnd(),r:rnd()*1.4+0.2,s:rnd()*0.8+0.2}));

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  PARTICLES
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
class P{
  constructor(x,y,col,sz,vx,vy,life,glow=true){
    this.x=x;this.y=y;this.col=col;this.sz=sz;this.osZ=sz;
    this.vx=vx??(rnd()-0.5)*6;this.vy=vy??(rnd()*-5-0.5);
    this.life=life;this.max=life;this.glow=glow;
  }
  tick(){this.x+=this.vx;this.y+=this.vy;this.vy+=0.13;this.life--;this.sz=Math.max(0,this.osZ*(this.life/this.max));}
  draw(ctx){
    if(this.life<=0||this.sz<0.5)return;
    const a=this.life/this.max;const s=this.sz;
    if(this.glow){
      const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,s*3.5);
      g.addColorStop(0,rgba(this.col,a));g.addColorStop(0.5,rgba(this.col,a*0.4));g.addColorStop(1,rgba(this.col,0));
      ctx.beginPath();ctx.arc(this.x,this.y,s*3.5,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    }
    ctx.beginPath();ctx.arc(this.x,this.y,Math.max(1,s),0,Math.PI*2);
    ctx.fillStyle=rgba(this.col,a);ctx.fill();
  }
}

function spawnParticles(col,glow,tier){
  const cx=bgC.width/2,cy=bgC.height*0.45;
  const n=[3,7,12,18,28,45,70,100][Math.min(tier,7)];
  for(let i=0;i<n;i++){
    const a=rnd()*Math.PI*2,sp=rnd()*4+1+tier*0.6;
    S.particles.push(new P(cx,cy,rnd()<0.5?col:glow,
      rnd()*5+2+tier*0.6,
      Math.cos(a)*sp,Math.sin(a)*sp-2,
      45+rnd()*45+tier*18));
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  LUCK / SPEED CALC
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function calcLuck(){
  let base=100;
  if(S.equipped_R){const g=GEARS.find(x=>x&&x.name===S.equipped_R);if(g)base+=g.luck_add||0;}
  // Talisman
  if(S.equipped_talisman){
    const tal=TALISMANS.find(t=>t.name===S.equipped_talisman);
    if(tal){
      if(tal.effectDynamic) base+=tal.effectDynamic(S.talisman_stacks||0);
      else base+=tal.luck_add||0;
    }
  }
  // Regular timed potions: additive
  let mult=1;
  S.active_potions.forEach(p=>{
    if(!p.luck_add) return;
    // One-roll ultra potions (Heavenly, Godlike, Oblivion, Bounded) multiply instead of add
    if(p.isRoll && p.luck_add>=1000000){
      mult*=(1+p.luck_add/100); // e.g. 15,000,000% = ×150,001 multiplier
    } else {
      base+=p.luck_add;
    }
  });
  return Math.round(base*mult);
}
function calcSpeedBonus(){
  // Returns total speed reduction % (positive = faster)
  let spd=0;
  if(S.equipped_R){const g=GEARS.find(x=>x&&x.name===S.equipped_R);if(g)spd+=g.speed_add||0;}
  S.active_potions.forEach(p=>{ if(p.speed_add) spd+=p.speed_add; });
  return spd;
}
function calcSpeed(){
  // Returns cooldown in MILLISECONDS
  let base=1000;
  const spd=calcSpeedBonus();
  base*=(1-Math.min(0.9,spd/100)); // cap at 90% reduction
  return Math.max(100,Math.round(base));
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  ROLL
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function doRoll(){
  const luck=calcLuck();
  const biome=BIOMES[S.biomeIdx];
  S.rolls++;S.bonusRollCtr++;

  // bonus roll
  let bonusMult=2;
  if(S.equipped_L==="Jackpot Gauntlet (L)")bonusMult=2;
  else if(S.equipped_L==="Gravitational Device")bonusMult=6;
  else if(S.equipped_L==="Flesh Device")bonusMult=1.3;
  else if(S.equipped_L==="Blessed Tide Gauntlet")bonusMult=2;
  const fleshActive=S.equipped_L==="Flesh Device";
  // Tide/Blessed Tide: every 6th roll triggers a biome boost
  if((S.equipped_L==="Tide Gauntlet"||S.equipped_L==="Blessed Tide Gauntlet")&&S.bonusRollCtr%6===0){
    const targetBiome=S.equipped_L==="Blessed Tide Gauntlet"?"Starfall":"Rainy";
    const bi=BIOMES.findIndex(b=>b.name===targetBiome);
    if(bi>0){S.biomeIdx=bi;S.biomeTimer=5;updateBiomeBar();toast(`🌊 Tide triggered: ${targetBiome}!`);}
  }
  // Gemstone: random luck bonus each roll
  let gemBonus=0;
  if(S.equipped_L==="Gemstone Gauntlet") gemBonus=Math.floor(rnd()*160);
  const isBonus=fleshActive||(S.bonusRollCtr%10===0);
  const effLuck=(luck+gemBonus)*(isBonus?bonusMult:1);

  // coin mult
  let coinMult=1;
  [S.equipped_R,S.equipped_L].forEach(n=>{if(!n)return;const g=GEARS.find(x=>x&&x.name===n);if(g&&g.coin_mult)coinMult=Math.max(coinMult,g.coin_mult);});

  // eligible auras — biome exclusive auras get weight boosted by biome.mult
  const biomeMult=BIOMES[S.biomeIdx].mult;
  const elig=AURAS.filter(a=>!a[4]||a[4]===biome.name);
  const weights=elig.map(a=>{
    const base=(effLuck/100)/a[1];
    let w=(a[4]&&a[4]===biome.name)?base*biomeMult:base;
    if(a[0]==="Solar"&&S.isDay) w*=10;
    if(a[0]==="Lunar"&&!S.isDay) w*=10;
    return w;
  });
  const total=weights.reduce((s,w)=>s+w,0);
  let r=rnd()*total,picked=elig[0];
  for(let i=0;i<elig.length;i++){r-=weights[i];if(r<=0){picked=elig[i];break;}}

  const [name,chance,col,glow,_]=picked;
  const tier=auraTier(chance);
  const baseCoins=Math.max(10,Math.floor(Math.log10(chance+1)*10));
  S.coins+=Math.round(baseCoins*coinMult);
  // Consume roll-type potions + decrement roll-based ones (Warp, Transcendent)
  S.active_potions=S.active_potions.filter(p=>{
    if(p.isRoll) return false; // single-roll potions consumed
    if(p.rollsLeft!==undefined){
      p.rollsLeft--;
      if(p.rollsLeft<=0) return false; // expired
    }
    return true;
  });

  // Collection unlock
  if(!S.collection[name]) S.collection[name]={count:0,unlocked:true};
  S.collection[name].count=(S.collection[name].count||0)+1;

  // Auto-delete check
  if(S.autoDelete.includes(name)){
    if(!document.hidden) addChatEntry(name,chance,col,glow,tier); // still show in chat
    updateHUD();save();return;
  }

  S.owned_auras[name]=(S.owned_auras[name]||0)+1;
  S.lastAura={name,chance,col,glow,tier,isBonus};

  // Auto-equip check
  if(S.autoEquip===name){
    S.equipped_aura=name;
    updateEquippedBadge();
    updateMusic();
    updateMusic();
  }

  // Random lucky potion drop (~1% chance)
  if(rnd()<0.01){
    S.owned_items["Lucky Potion"]=(S.owned_items["Lucky Potion"]||0)+1;
    toast("🍀 Lucky Potion found!");
  }
  // Roulette ticket drop — base 1/10000, scales with luck
  if(rnd()<(0.0005*(Math.max(100,calcLuck())/100))){
    S.roulette_tickets++;
    toast("🎟️ Item Roulette Ticket found! ("+S.roulette_tickets+" total)",3000);
  }

  spawnParticles(col,glow,tier);
  if(!document.hidden) addChatEntry(name,chance,col,glow,tier);

  // Cutscene thresholds: 10k+ gets one; tier 3+ (Legendary) gets full cutscene
  if(name==="Eclipse"||name==="Atlas : A.T.L.A.S."){
    updateAuraDisplay(); // craft-only auras — no cutscene, handled by craft flow
  } else if(tier>=4) playCutscene(picked,tier);            // Mythic+ (1M+) = full cutscene
  else if(chance>=100000) playStarCutscene(picked,tier);   // Legendary (100k-999k) = 8-pt star
  else if(chance>=10000) playStarCutscene(picked,tier);    // Unique (10k-99k) = 4-pt star
  else updateAuraDisplay();

  tickMerchant();
  updateHUD();save();
}

//  HUD + AURA DISPLAY

function updateHUD(){
  document.getElementById("hud-coins").textContent=S.coins.toLocaleString();
  document.getElementById("hud-rolls").textContent=S.rolls.toLocaleString();
  const spd=calcSpeedBonus();
  document.getElementById("hud-luck").textContent=calcLuck()+"%"+(spd?` +${Math.round(spd)}⚡`:"");
}

function updateAuraDisplay(){
  if(!S.lastAura)return;
  const {name,chance,col,glow,tier,isBonus}=S.lastAura;
  const nameEl=document.getElementById("aura-name");
  const tierEl=document.getElementById("aura-tier");
  const subEl=document.getElementById("aura-sub");
  const bonEl=document.getElementById("bonus-tag");
  nameEl.textContent=name;
  nameEl.style.color=rgb(glow);
  nameEl.style.textShadow=`0 0 20px ${rgb(col)},0 0 40px ${rgb(glow)}`;
  tierEl.textContent=TIER_NAMES[tier];
  tierEl.style.color=TIER_COLS[tier];
  const isCraftOnly=(name==="Eclipse"||name==="Atlas : A.T.L.A.S.");
  subEl.textContent=(S.lastAura.crafted||isCraftOnly)?"[ Crafted aura ]":`1 in ${chance.toLocaleString()}`;
  tierEl.style.display=isCraftOnly?"none":"";
  bonEl.style.opacity=isBonus?"1":"0";
  // Keep equipped badge in sync - it shows equipped_aura not lastAura
  updateEquippedBadge();
}

function updateBiomeBar(){
  const b=BIOMES[S.biomeIdx];
  const bar=document.getElementById("biome-bar");
  bar.textContent=`${b.emoji} ${b.name}${S.biomeTimer>0?` · ${Math.ceil(S.biomeTimer)}s`:""}`;
  bar.style.color=rgb(b.color);
  bar.style.borderColor=rgba(b.color,0.4);
}

function hsl(h,s,l,a=1){return`hsla(${h},${s}%,${l}%,${a})`;}


// ── Star cutscenes for 10k–1B auras ─────────────────────────────────────
let starCsActive=false, starCsT=0, starCsDur=0, starCsAura=null, starCsTier=0;
let starCsParticles=[];

function playStarCutscene(aura,tier){
  // 10k-999k: 4-point star; 1M-99M: 8-point star; 99M-1B: 8-point + extras
  // 1B+: handled by playCutscene already
  if(starCsActive||csActive) return;
  starCsAura=aura; starCsTier=tier; starCsT=0;
  starCsDur=tier<=1?80:tier<=2?120:180;
  starCsParticles=[];
  const cc=document.getElementById("cs-canvas");
  cc.width=window.innerWidth; cc.height=window.innerHeight;
  csCtx=cc.getContext("2d");
  const [name,chance,col,glow]=aura;
  const fs=Math.min(28,14+tier*2);
  const txtEl=document.getElementById("cs-text");
  txtEl.style.opacity="0";
  document.getElementById("cutscene").classList.add("active");
  document.getElementById("aura-display").style.opacity="0";
  starCsActive=true;
  setTimeout(()=>{txtEl.style.opacity="1";},200);
  txtEl.innerHTML=`
    <div style="font-size:10px;color:#222;margin-top:80px;letter-spacing:3px">· tap to continue ·</div>
  `;
  document.getElementById("cutscene").addEventListener("click",endStarCutscene,{once:true});
}

function endStarCutscene(){
  const txtEl=document.getElementById("cs-text");
  txtEl.style.opacity="0";
  setTimeout(()=>{
    const fl=document.getElementById("cs-flash");
    fl.style.transition="opacity 0.05s"; fl.style.opacity="1";
    setTimeout(()=>{
      document.getElementById("cutscene").classList.remove("active");
      starCsActive=false;
      document.getElementById("aura-display").style.opacity="1";
      updateAuraDisplay();
      onCutsceneDone();
      setTimeout(()=>{fl.style.transition="opacity 0.5s";fl.style.opacity="0";},80);
    },120);
  },300);
}

function drawStar(ctx,cx,cy,r,points,col,glow,t,alpha=1){
  // draw n-pointed star
  ctx.save(); ctx.translate(cx,cy); ctx.rotate(t*0.02);
  ctx.beginPath();
  for(let i=0;i<points*2;i++){
    const a=i/(points*2)*Math.PI*2 - Math.PI/2; // full circle, top-aligned
    const rr=(i%2===0)?r:r*0.4;
    i===0?ctx.moveTo(Math.cos(a)*rr,Math.sin(a)*rr):ctx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr);
  }
  ctx.closePath();
  ctx.fillStyle=`rgba(${col[0]},${col[1]},${col[2]},${alpha*0.7})`;
  ctx.fill();
  ctx.strokeStyle=`rgba(${glow[0]},${glow[1]},${glow[2]},${alpha})`;
  ctx.lineWidth=2; ctx.stroke();
  ctx.restore();
}

function tickStarCutscene(){
  if(!starCsActive) return;
  starCsT++;
  const [name,chance,col,glow]=starCsAura;
  const cc=document.getElementById("cs-canvas");
  const W=cc.width, H=cc.height;
  const cx=W/2, cy=H/2;
  const t=starCsT;
  // fade in over 30 frames, fade out over last 30
  const alpha=Math.min(1,t/30)*Math.min(1,(starCsDur-t)/30);

  // solid dark background
  csCtx.fillStyle="rgba(4,4,14,1)";
  csCtx.fillRect(0,0,W,H);

  const pts=chance>=100000?8:4;

  // grow from 0 to final size, overshoot slightly then settle
  const maxR=Math.min(W,H)*0.28;
  const growT=Math.min(1,t/60);
  const bounce=growT<1?Math.sin(growT*Math.PI)*0.15:0;
  const starR=maxR*(growT+bounce)*alpha;

  if(starR>5){
    // === OUTER GLOW (multiple passes for bloom effect) ===
    for(let pass=3;pass>=0;pass--){
      const gr=csCtx.createRadialGradient(cx,cy,starR*0.5,cx,cy,starR*(2+pass*0.5));
      gr.addColorStop(0,`rgba(${glow[0]},${glow[1]},${glow[2]},${alpha*(0.25-pass*0.05)})`);
      gr.addColorStop(1,"rgba(0,0,0,0)");
      csCtx.beginPath();csCtx.arc(cx,cy,starR*(2+pass*0.5),0,Math.PI*2);
      csCtx.fillStyle=gr;csCtx.fill();
    }

    // === MAIN STAR SHAPE ===
    const rotation=t*0.015;
    // fill
    csCtx.save();csCtx.translate(cx,cy);csCtx.rotate(rotation);
    csCtx.beginPath();
    for(let i=0;i<pts*2;i++){
      const a=i/(pts*2)*Math.PI*2-Math.PI/2;
      const rr=i%2===0?starR:starR*0.38;
      i===0?csCtx.moveTo(Math.cos(a)*rr,Math.sin(a)*rr):csCtx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr);
    }
    csCtx.closePath();
    const fillG=csCtx.createRadialGradient(0,0,0,0,0,starR);
    fillG.addColorStop(0,`rgba(${glow[0]},${glow[1]},${glow[2]},${alpha})`);
    fillG.addColorStop(0.6,`rgba(${col[0]},${col[1]},${col[2]},${alpha*0.9})`);
    fillG.addColorStop(1,`rgba(${col[0]},${col[1]},${col[2]},${alpha*0.4})`);
    csCtx.fillStyle=fillG;csCtx.fill();
    // bright stroke
    csCtx.strokeStyle=`rgba(${glow[0]},${glow[1]},${glow[2]},${alpha})`;
    csCtx.lineWidth=2.5;csCtx.stroke();
    csCtx.restore();

    // === INNER COUNTER-ROTATING STAR ===
    csCtx.save();csCtx.translate(cx,cy);csCtx.rotate(-rotation*1.8);
    csCtx.beginPath();
    for(let i=0;i<pts*2;i++){
      const a=i/(pts*2)*Math.PI*2-Math.PI/2;
      const rr=i%2===0?starR*0.5:starR*0.18;
      i===0?csCtx.moveTo(Math.cos(a)*rr,Math.sin(a)*rr):csCtx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr);
    }
    csCtx.closePath();
    csCtx.fillStyle=`rgba(${glow[0]},${glow[1]},${glow[2]},${alpha*0.7})`;
    csCtx.fill();
    csCtx.restore();

    // === SPIKE RAYS from star tips ===
    csCtx.save();csCtx.translate(cx,cy);csCtx.rotate(rotation);
    for(let i=0;i<pts;i++){
      const a=i/pts*Math.PI*2-Math.PI/2;
      const x1=Math.cos(a)*starR, y1=Math.sin(a)*starR;
      const x2=Math.cos(a)*starR*1.7, y2=Math.sin(a)*starR*1.7;
      const rayG=csCtx.createLinearGradient(x1,y1,x2,y2);
      rayG.addColorStop(0,`rgba(${glow[0]},${glow[1]},${glow[2]},${alpha*0.8})`);
      rayG.addColorStop(1,`rgba(${glow[0]},${glow[1]},${glow[2]},0)`);
      csCtx.beginPath();csCtx.moveTo(x1,y1);csCtx.lineTo(x2,y2);
      csCtx.strokeStyle=rayG;csCtx.lineWidth=2;csCtx.stroke();
    }
    csCtx.restore();

    // === 8-pt gets extra outer star ring ===
    if(pts===8){
      csCtx.save();csCtx.translate(cx,cy);csCtx.rotate(rotation*0.4+Math.PI/8);
      csCtx.beginPath();
      for(let i=0;i<pts*2;i++){
        const a=i/(pts*2)*Math.PI*2-Math.PI/2;
        const rr=i%2===0?starR*1.4:starR*0.55;
        i===0?csCtx.moveTo(Math.cos(a)*rr,Math.sin(a)*rr):csCtx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr);
      }
      csCtx.closePath();
      csCtx.strokeStyle=`rgba(${col[0]},${col[1]},${col[2]},${alpha*0.4})`;
      csCtx.lineWidth=1.5;csCtx.stroke();
      csCtx.restore();
    }
  }

  if(t>=starCsDur) endStarCutscene();
}

// ── special cutscene: Equinox (yin-yang, B&W) ────────────────────────────
function tickEquinox(cc,cx,cy){
  const t=csT;
  const W=cc.width,H=cc.height;
  csCtx.fillStyle="#000";csCtx.fillRect(0,0,W,H);

  // slow rotation angle
  const ang=t*0.018;
  const R=Math.min(cx,cy)*0.52;

  csCtx.save();csCtx.translate(cx,cy);csCtx.rotate(ang);

  // main circle — white half
  csCtx.beginPath();csCtx.arc(0,0,R,-Math.PI/2,Math.PI/2);csCtx.lineTo(0,0);
  csCtx.fillStyle="#fff";csCtx.fill();
  // black half
  csCtx.beginPath();csCtx.arc(0,0,R,Math.PI/2,-Math.PI/2);csCtx.lineTo(0,0);
  csCtx.fillStyle="#111";csCtx.fill();

  // top small white bubble (on black side)
  csCtx.beginPath();csCtx.arc(0,-R/2,R/4,0,Math.PI*2);
  csCtx.fillStyle="#fff";csCtx.fill();
  // bottom small black bubble (on white side)
  csCtx.beginPath();csCtx.arc(0,R/2,R/4,0,Math.PI*2);
  csCtx.fillStyle="#111";csCtx.fill();

  // tiny dots
  csCtx.beginPath();csCtx.arc(0,-R/2,R/12,0,Math.PI*2);
  csCtx.fillStyle="#111";csCtx.fill();
  csCtx.beginPath();csCtx.arc(0,R/2,R/12,0,Math.PI*2);
  csCtx.fillStyle="#fff";csCtx.fill();

  // outer ring
  csCtx.beginPath();csCtx.arc(0,0,R,0,Math.PI*2);
  csCtx.strokeStyle="rgba(255,255,255,0.5)";csCtx.lineWidth=2;csCtx.stroke();

  csCtx.restore();

  // outer glow rings (counter-rotate)
  for(let ri=0;ri<5;ri++){
    const rr=R*1.1+ri*18+Math.sin(t*0.04+ri)*5;
    csCtx.save();csCtx.translate(cx,cy);csCtx.rotate(-ang*(1+ri*0.3));
    const pts=8+ri*4;
    for(let i=0;i<pts;i++){
      const a=i/pts*Math.PI*2;
      const bright=i%2===0?255:80;
      csCtx.beginPath();
      csCtx.moveTo(Math.cos(a)*rr*0.85,Math.sin(a)*rr*0.85);
      csCtx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr);
      csCtx.strokeStyle=`rgba(${bright},${bright},${bright},${0.4-ri*0.06})`;
      csCtx.lineWidth=1.5;csCtx.stroke();
    }
    csCtx.restore();
  }

  // B&W particles
  if(t%2===0){
    for(let i=0;i<6;i++){
      const a=rnd()*Math.PI*2,sp=rnd()*3+1;
      const white=rnd()<0.5;
      csParticles.push(new P(cx,cy,
        white?[240,240,240]:[30,30,30],
        rnd()*5+2,Math.cos(a)*sp,Math.sin(a)*sp-2,50+rnd()*50));
    }
  }
}

// ── special cutscene: ▣ PIXELATION ▣ (rainbow) ───────────────────────────
function tickPixelation(cc,cx,cy){
  const t=csT;
  const W=cc.width,H=cc.height;

  // dark bg with shifting rainbow tint
  csCtx.fillStyle=`hsla(${t*2%360},60%,4%,1)`;csCtx.fillRect(0,0,W,H);

  // pixel grid — chunky colored squares marching
  const PS=18;
  const cols=Math.ceil(W/PS)+2,rows=Math.ceil(H/PS)+2;
  for(let row=0;row<rows;row++){
    for(let col=0;col<cols;col++){
      const hue=(col*30+row*20+t*4)%360;
      const bri=Math.sin((col+row)*0.4+t*0.07);
      if(bri>0.3){
        csCtx.fillStyle=`hsla(${hue},100%,55%,${(bri-0.3)*0.35})`;
        csCtx.fillRect(col*PS-PS,row*PS-PS,PS-1,PS-1);
      }
    }
  }

  // rainbow rings (fast spin)
  for(let ri=0;ri<8;ri++){
    const r=40+ri*22+Math.sin(t*0.08+ri)*8;
    csCtx.save();csCtx.translate(cx,cy);
    csCtx.rotate(t*0.025*(ri%2===0?1:-1)*(1+ri*0.2));
    const pts=6+ri*3;
    for(let i=0;i<pts;i++){
      const a=i/pts*Math.PI*2;
      const hue=(i/pts*360+t*6+ri*40)%360;
      csCtx.beginPath();
      csCtx.moveTo(Math.cos(a)*r*0.7,Math.sin(a)*r*0.7);
      csCtx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
      csCtx.strokeStyle=`hsla(${hue},100%,65%,${0.7-ri*0.06})`;
      csCtx.lineWidth=2;csCtx.stroke();
    }
    csCtx.restore();
  }

  // core orb — solid rainbow cycle
  const orbR=28+Math.sin(t*0.1)*4;
  const hueBase=(t*3)%360;
  const orbGr=csCtx.createRadialGradient(cx,cy,0,cx,cy,orbR*2.5);
  orbGr.addColorStop(0,`hsla(${hueBase},100%,80%,1)`);
  orbGr.addColorStop(0.4,`hsla(${(hueBase+60)%360},100%,55%,0.7)`);
  orbGr.addColorStop(1,`hsla(${(hueBase+120)%360},100%,30%,0)`);
  csCtx.beginPath();csCtx.arc(cx,cy,orbR*2.5,0,Math.PI*2);
  csCtx.fillStyle=orbGr;csCtx.fill();
  csCtx.beginPath();csCtx.arc(cx,cy,orbR,0,Math.PI*2);
  csCtx.fillStyle=`hsla(${hueBase},100%,75%,1)`;csCtx.fill();

  // chunky pixel particles
  if(t%2===0){
    for(let i=0;i<8;i++){
      const a=rnd()*Math.PI*2,sp=rnd()*4+2;
      const h=Math.floor(rnd()*360);
      const pCol=[
        Math.round(127+127*Math.cos(h*Math.PI/180)),
        Math.round(127+127*Math.cos((h+120)*Math.PI/180)),
        Math.round(127+127*Math.cos((h+240)*Math.PI/180))
      ];
      csParticles.push(new P(cx,cy,pCol,rnd()*7+3,
        Math.cos(a)*sp,Math.sin(a)*sp-2,55+rnd()*55));
    }
  }

  // scanline glitch strips
  if(t%8<3){
    for(let i=0;i<3;i++){
      const gy=Math.floor(rnd()*H);
      const gh=Math.floor(rnd()*8+2);
      const hh=Math.floor(rnd()*360);
      csCtx.fillStyle=`hsla(${hh},100%,60%,0.15)`;
      csCtx.fillRect(0,gy,W,gh);
    }
  }
}

function flashAndReturn(){
  // White flash then hide cutscene and return to game
  const fl=document.getElementById("cs-flash");
  fl.style.transition="opacity 0.05s";
  fl.style.opacity="1";
  setTimeout(()=>{
    document.getElementById("cutscene").classList.remove("active");
    document.getElementById("cutscene").style.opacity="1";
    document.getElementById("cs-text").style.opacity="1";
    csActive=false;
    csParticles=[];
    document.getElementById("aura-display").style.opacity="1";
    updateAuraDisplay();
    updateEquippedBadge();
    setTimeout(()=>{
      fl.style.transition="opacity 0.6s";
      fl.style.opacity="0";
    },80);
  },120);
}

function triggerFlash(){
  const txtEl=document.getElementById("cs-text");
  txtEl.style.opacity="0";
  setTimeout(()=>{ flashAndReturn(); onCutsceneDone(); }, 400);
}

function playCutscene(aura,tier){
  csAura=aura; csTier=tier; csT=0;
  csDur=[0,0,0,160,200,260,340,440,520][Math.min(tier,8)];
  csParticles=[];
  const cc=document.getElementById("cs-canvas");
  cc.width=window.innerWidth; cc.height=window.innerHeight;
  csCtx=cc.getContext("2d");
  document.getElementById("aura-display").style.opacity="0";
  document.getElementById("cutscene").classList.add("active");
  document.getElementById("cutscene").style.opacity="1";
  document.getElementById("cs-text").innerHTML=
    "<div style='font-size:10px;color:#333;margin-top:80px;letter-spacing:3px'>· tap to continue ·</div>";
  csActive=true;
  document.getElementById("cutscene").addEventListener("click",triggerFlash,{once:true});
}

// ─── per-aura cutscene draw functions ───────────────────────────────────────
function drawCsDefault(cc,cx,cy,col,glow,t,tier){
  // Solid dark bg
  csCtx.fillStyle="rgba(4,4,16,1)"; csCtx.fillRect(0,0,cc.width,cc.height);
  const alpha=Math.min(1,t/30);
  const R=Math.min(cx,cy)*0.5*(Math.min(1,t/60));
  // Outer glow
  const og=csCtx.createRadialGradient(cx,cy,R*0.3,cx,cy,R*2.5);
  og.addColorStop(0,`rgba(${glow[0]},${glow[1]},${glow[2]},${alpha*0.5})`);
  og.addColorStop(0.4,`rgba(${col[0]},${col[1]},${col[2]},${alpha*0.2})`);
  og.addColorStop(1,"rgba(0,0,0,0)");
  csCtx.beginPath();csCtx.arc(cx,cy,R*2.5,0,Math.PI*2);csCtx.fillStyle=og;csCtx.fill();
  // Central orb
  if(R>5){
    const og2=csCtx.createRadialGradient(cx,cy,0,cx,cy,R);
    og2.addColorStop(0,`rgba(${glow[0]},${glow[1]},${glow[2]},${alpha})`);
    og2.addColorStop(0.5,`rgba(${col[0]},${col[1]},${col[2]},${alpha*0.8})`);
    og2.addColorStop(1,`rgba(${col[0]},${col[1]},${col[2]},0)`);
    csCtx.beginPath();csCtx.arc(cx,cy,R,0,Math.PI*2);csCtx.fillStyle=og2;csCtx.fill();
  }
  // Rotating rings — one per tier level above 3
  const rings=tier-2;
  for(let ri=0;ri<rings;ri++){
    const rr=R*(0.8+ri*0.35)+Math.sin(t*0.06+ri)*8;
    csCtx.save();csCtx.translate(cx,cy);csCtx.rotate(t*0.012*(ri%2===0?1:-1));
    const pts=6+ri*2;
    csCtx.beginPath();
    for(let i=0;i<pts*2;i++){
      const a=i/(pts*2)*Math.PI*2;
      const r2=i%2===0?rr:rr*0.55;
      i===0?csCtx.moveTo(Math.cos(a)*r2,Math.sin(a)*r2):csCtx.lineTo(Math.cos(a)*r2,Math.sin(a)*r2);
    }
    csCtx.closePath();
    csCtx.strokeStyle=`rgba(${glow[0]},${glow[1]},${glow[2]},${alpha*(0.7-ri*0.1)})`;
    csCtx.lineWidth=2; csCtx.stroke();
    // fill with faint color
    csCtx.fillStyle=`rgba(${col[0]},${col[1]},${col[2]},${alpha*0.08})`;
    csCtx.fill();
    csCtx.restore();
  }
  // Spike rays from center
  const spikes=8+(tier-3)*4;
  for(let i=0;i<spikes;i++){
    const a=i/spikes*Math.PI*2+t*0.008;
    const len=R*(1.4+Math.sin(t*0.1+i)*0.2);
    const rg=csCtx.createLinearGradient(cx,cy,cx+Math.cos(a)*len,cy+Math.sin(a)*len);
    rg.addColorStop(0,`rgba(${glow[0]},${glow[1]},${glow[2]},${alpha*0.6})`);
    rg.addColorStop(1,"rgba(0,0,0,0)");
    csCtx.beginPath();csCtx.moveTo(cx,cy);csCtx.lineTo(cx+Math.cos(a)*len,cy+Math.sin(a)*len);
    csCtx.strokeStyle=rg;csCtx.lineWidth=1.5+i%2;csCtx.stroke();
  }
  // Particles around the ring
  if(t%3===0){
    const pRing=R*0.9;
    for(let i=0;i<3+tier;i++){
      const a=rnd()*Math.PI*2;
      const px=cx+Math.cos(a)*pRing*(0.7+rnd()*0.6);
      const py=cy+Math.sin(a)*pRing*(0.7+rnd()*0.6);
      csParticles.push(new P(px,py,rnd()<0.5?col:glow,rnd()*4+2,
        (rnd()-0.5)*2,(rnd()-0.5)*2-0.5,40+rnd()*40));
    }
  }
}

function drawCsEquinox(cc,cx,cy,t){
  csCtx.fillStyle=`rgba(4,4,14,1)`; csCtx.fillRect(0,0,cc.width,cc.height);
  const alpha=Math.min(1,t/30);
  const R=Math.min(cx,cy)*0.45*(Math.min(1,t/60));
  if(R<4) return;
  // Yin-yang halves
  csCtx.save();csCtx.translate(cx,cy);csCtx.rotate(t*0.008);
  csCtx.beginPath();csCtx.arc(0,0,R,Math.PI*1.5,Math.PI*0.5);csCtx.fillStyle=`rgba(240,240,240,${alpha})`;csCtx.fill();
  csCtx.beginPath();csCtx.arc(0,0,R,Math.PI*0.5,Math.PI*1.5);csCtx.fillStyle=`rgba(10,10,30,${alpha})`;csCtx.fill();
  csCtx.beginPath();csCtx.arc(0,-R/2,R/2,0,Math.PI*2);csCtx.fillStyle=`rgba(240,240,240,${alpha})`;csCtx.fill();
  csCtx.beginPath();csCtx.arc(0,R/2,R/2,0,Math.PI*2);csCtx.fillStyle=`rgba(10,10,30,${alpha})`;csCtx.fill();
  csCtx.beginPath();csCtx.arc(0,-R/2,R/8,0,Math.PI*2);csCtx.fillStyle=`rgba(10,10,30,${alpha})`;csCtx.fill();
  csCtx.beginPath();csCtx.arc(0,R/2,R/8,0,Math.PI*2);csCtx.fillStyle=`rgba(240,240,240,${alpha})`;csCtx.fill();
  csCtx.beginPath();csCtx.arc(0,0,R,0,Math.PI*2);csCtx.strokeStyle=`rgba(150,150,150,${alpha*0.5})`;csCtx.lineWidth=2;csCtx.stroke();
  csCtx.restore();
  // Orbiting dual rings
  for(let i=0;i<2;i++){
    csCtx.save();csCtx.translate(cx,cy);csCtx.rotate(t*0.015*(i===0?1:-1));
    csCtx.beginPath();csCtx.ellipse(0,0,R*1.5,R*0.35,0,0,Math.PI*2);
    csCtx.strokeStyle=i===0?`rgba(240,240,240,${alpha*0.4})`:`rgba(20,20,60,${alpha*0.8})`;
    csCtx.lineWidth=2;csCtx.stroke();csCtx.restore();
  }
}

function drawCsPixelation(cc,cx,cy,t){
  csCtx.fillStyle=`rgba(0,0,0,0.4)`; csCtx.fillRect(0,0,cc.width,cc.height);
  const alpha=Math.min(1,t/20);
  const PS=12;
  // Expanding pixel ring
  const ringR=Math.min(cx,cy)*0.55*(Math.min(1,t/50));
  for(let x=cx-ringR*1.4;x<cx+ringR*1.4;x+=PS){
    for(let y=cy-ringR*1.4;y<cy+ringR*1.4;y+=PS){
      const d=Math.sqrt((x-cx)**2+(y-cy)**2);
      if(d>ringR*0.7&&d<ringR*1.4){
        const hue=((x+y)*2+(t*30))%360;
        const a=(1-(Math.abs(d-ringR)/ringR*0.7))*alpha*0.8;
        csCtx.fillStyle=`hsla(${hue},100%,55%,${a})`;
        csCtx.fillRect(x,y,PS-1,PS-1);
      }
    }
  }
  // Center flash
  if(t%4<2){
    csCtx.fillStyle=`rgba(${Math.floor(rnd()*255)},${Math.floor(rnd()*255)},${Math.floor(rnd()*255)},0.15)`;
    csCtx.fillRect(cx-50,cy-50,100,100);
  }
}

function tickCutscene(){
  if(!csActive) return;
  csT++;
  const [name,,col,glow]=csAura;
  const cc=document.getElementById("cs-canvas");
  const cx=cc.width/2, cy=cc.height/2;

  if(name==="Equinox") drawCsEquinox(cc,cx,cy,csT);
  else if(name==="▣ PIXELATION ▣") drawCsPixelation(cc,cx,cy,csT);
  else drawCsDefault(cc,cx,cy,col,glow,csT,csTier);

  csParticles=csParticles.filter(p=>p.life>0);
  if(csParticles.length>200)csParticles=csParticles.slice(-200);
  csParticles.forEach(p=>{p.tick();p.draw(csCtx);});

  if(csT>=csDur) triggerFlash();
}

let activeMerchant=null, merchantTimer=0, merchantDespawnTimer=0, merchantRollCount=0;
const MERCHANT_SPAWN_INTERVAL=350; // ~every 350 rolls (simulates 15-45min)
const MERCHANT_DURATION=180; // despawn after 180 rolls

function tickMerchant(){
  merchantRollCount++;
  if(!activeMerchant){
    merchantTimer++;
    if(merchantTimer>=MERCHANT_SPAWN_INTERVAL){
      merchantTimer=0;
      spawnMerchant();
    }
  } else {
    merchantDespawnTimer++;
    if(merchantDespawnTimer>=MERCHANT_DURATION){
      despawnMerchant();
    }
  }
}

function spawnMerchant(){
  const r=rnd();
  const key=r<0.8?"Mari":r<0.9?"Rin":"Jester";
  activeMerchant=key;
  merchantDespawnTimer=0;
  const m=MERCHANT_DEFS[key];
  toast(`${m.emoji} ${key} has arrived! Tap to trade.`,4000);
  // Show merchant button
  document.getElementById("merchant-btn").style.display="flex";
  document.getElementById("merchant-btn").textContent=m.emoji;
}

function despawnMerchant(){
  activeMerchant=null;
  document.getElementById("merchant-btn").style.display="none";
  toast("Merchant has left.",1500);
}

function openMerchant(){
  if(!activeMerchant) return;
  const m=MERCHANT_DEFS[activeMerchant];
  document.getElementById("overlay-title").textContent=`${m.emoji} ${activeMerchant}`;
  document.getElementById("tab-bar").innerHTML="";
  const c=document.getElementById("overlay-content");c.innerHTML="";

  // greeting
  const greet=document.createElement("div");
  greet.style.cssText="grid-column:1/-1;color:#888;font-size:11px;padding:8px;border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:4px;font-style:italic;";
  greet.textContent=`"${m.greeting}"`;
  c.appendChild(greet);

  // dark points balance for Jester
  if(activeMerchant==="Jester"){
    const dp=document.createElement("div");
    dp.style.cssText="grid-column:1/-1;color:#cc44ff;font-size:11px;padding:4px 8px;";
    dp.textContent=`Dark Points: ${S.owned_items["Dark Points"]||0} P`;
    c.appendChild(dp);
  }

  m.items.forEach(item=>{
    const card=document.createElement("div");card.className="card";
    const currency=item.currency||"🪙 Coins";
    let balance;
    if(item.currency==="Dark Points") balance=S.owned_items["Dark Points"]||0;
    else if(item.currency==="Void Coins") balance=S.owned_items["Void Coin"]||0;
    else balance=S.coins;
    const canAfford=balance>=item.cost;
    card.style.borderColor=canAfford?"rgba(255,200,80,0.4)":"rgba(255,255,255,0.08)";
    card.innerHTML=`
      <div class="card-name" style="color:${m.color}">${item.name}</div>
      <div class="card-sub">${item.desc}</div>
      <div class="card-cost" style="color:${canAfford?'#ffd700':'#ff6060'}">
        ${item.currency==="Void Coins"?"💜 "+item.cost+" Void Coins (have: "+(S.owned_items["Void Coin"]||0)+")":item.currency==="Dark Points"?"⚫ "+item.cost+" Dark Points":"🪙 "+item.cost.toLocaleString()+" Coins"}
      </div>
      <button style="margin-top:8px;width:100%;padding:6px;background:${canAfford?"rgba(255,180,0,0.2)":"rgba(255,255,255,0.04)"};border:1px solid ${canAfford?"rgba(255,180,0,0.4)":"rgba(255,255,255,0.1)"};border-radius:6px;color:${canAfford?"#ffcc60":"#555"};font-family:inherit;font-size:10px;cursor:pointer;">${canAfford?"BUY":"CAN'T AFFORD"}</button>
    `;
    card.querySelector("button").onclick=(e)=>{
      e.stopPropagation();
      if(!canAfford){
        if(item.currency==="Void Coins") toast("❌ Need "+item.cost+" Void Coins! (buy from Mari)");
        else if(item.currency==="Dark Points") toast("❌ Need "+item.cost+" Dark Points!");
        else toast("❌ Not enough coins!");
        return;
      }
      if(item.currency==="Dark Points") S.owned_items["Dark Points"]=(S.owned_items["Dark Points"]||0)-item.cost;
      else if(item.currency==="Void Coins") S.owned_items["Void Coin"]-=item.cost;
      else S.coins-=item.cost;
      item.action();
      toast(`✅ Bought: ${item.name}`);
      updateHUD();save();openMerchant();
    };
    c.appendChild(card);
  });

  // dark point exchange for Jester
  if(activeMerchant==="Jester"){
    const exBtn=document.createElement("div");
    exBtn.style.cssText="grid-column:1/-1;padding:10px;background:rgba(200,60,255,0.08);border:1px solid rgba(200,60,255,0.3);border-radius:8px;font-size:10px;color:#cc44ff;cursor:pointer;text-align:center;";
    const BIOME_ITEM_DP={"Wind Essence":1,"Icicle":1,"Rainy Bottle":1,"Piece of Star":3,"Eternal Flame":13,"Curruptaine":10,"NULL":20};
    exBtn.innerHTML="🔮 Exchange items for Dark Points<br/><span style='color:#888;font-size:9px'>10 Lucky Potions=100DP · Void Coin=500DP · Biome items=1-20DP each</span>";
    exBtn.onclick=()=>{
      const lp=S.owned_items["Lucky Potion"]||0;
      const vc=S.owned_items["Void Coin"]||0;
      // Check biome items first
      let biomeGain=0;
      Object.entries(BIOME_ITEM_DP).forEach(([item,dp])=>{
        const qty=S.owned_items[item]||0;
        if(qty>0){biomeGain+=qty*dp;S.owned_items[item]=0;}
      });
      if(biomeGain>0){
        S.owned_items["Dark Points"]=(S.owned_items["Dark Points"]||0)+biomeGain;
        toast("+"+biomeGain+" Dark Points from biome items!");
      } else if(lp>=10){
        S.owned_items["Lucky Potion"]-=10;
        S.owned_items["Dark Points"]=(S.owned_items["Dark Points"]||0)+100;
        toast("+100 Dark Points!");
      } else if(vc>=1){
        S.owned_items["Void Coin"]--;
        S.owned_items["Dark Points"]=(S.owned_items["Dark Points"]||0)+500;
        toast("+500 Dark Points from Void Coin!");
      } else {
        toast("❌ No Lucky Potions, Void Coins or biome items to exchange");return;
      }
      updateHUD();save();openMerchant();
    };
    c.appendChild(exBtn);
  }

  document.getElementById("overlay").classList.add("open");
}

function openChest(type){
  const table=CHEST_TABLES[type];if(!table)return;
  const total=table.reduce((s,r)=>s+r.w,0);
  let rv=rnd()*total,reward=table[0];
  for(const row of table){rv-=row.w;if(rv<=0){reward=row;break;}}
  const qty=reward.qty();
  S.owned_items[reward.item]=(S.owned_items[reward.item]||0)+qty;
  save();updateHUD();
  toast(`📦 ${type} Chest: ${qty}× ${reward.item}!`,3000);
}

// ── Passive drops every minute ────────────────────────────────────
let passiveDropTimer=0;
let cloudSaveTimer=0;
function tickPassiveDrops(dt){
  // Cloud auto-save every 60 seconds if signed in
  if(sbUser && sbClient){
    cloudSaveTimer+=dt;
    if(cloudSaveTimer>=60000){
      cloudSaveTimer=0;
      saveCloudSave(true); // silent=true, no toast
    }
  }
  passiveDropTimer+=dt;
  if(passiveDropTimer>=60000){
    passiveDropTimer=0;
    const r=rnd();
    if(r<0.30){S.owned_items["Lucky Potion"]=(S.owned_items["Lucky Potion"]||0)+1;if(!document.hidden)toast("🍀 Found a Lucky Potion!");}
    else if(r<0.55){S.owned_items["Speed Potion"]=(S.owned_items["Speed Potion"]||0)+1;if(!document.hidden)toast("⚡ Found a Speed Potion!");}
    // 3% chance normal chest, 1% rare chest
    else if(r<0.58){openChest("Normal");}
    else if(r<0.59){openChest("Rare");}
    save();
  }
}

//  BIOME TICK
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function tickBiome(dt){
  const dtSec=dt/1000;
  if(S.biomeIdx>0){
    S.biomeTimer-=dtSec;
    if(S.biomeTimer<=0){
      S.biomeIdx=0;
      updateBiomeBar();
      if(!document.hidden) toast("🌍 Biome returned to Normal");
    }
  }
  // Per-second spawn check — each biome has its own wiki-accurate chance per second
  if(S.biomeIdx===0){
    for(let i=1;i<BIOMES.length;i++){
      const b=BIOMES[i];
      if(rnd()<b.spawnChance*dtSec){
        S.biomeIdx=i;
        S.biomeTimer=b.dur;
        updateBiomeBar();
        if(b.item){
          const qty=b.itemQty+(b.itemQty>1?Math.floor(rnd()*3):0);
          S.owned_items[b.item]=(S.owned_items[b.item]||0)+qty;
          save();
          if(!document.hidden) toast(`${b.emoji} ${b.name} biome! Got ${qty}× ${b.item}!`,4000);
        } else {
          if(!document.hidden) toast(`${b.emoji} ${b.name} biome!`,3000);
        }
        break; // only one biome at a time
      }
    }
  }
}

//  SHOP OVERLAY

// ── Crafting helpers ──────────────────────────────────────────────────────
function canCraft(recipe){
  // Check if player has all needed auras/items/gears
  for(const ing of recipe.ingredients){
    const have=S.owned_auras[ing.name]||S.owned_items[ing.name]||0;
    const haveGear=S.owned_gears[ing.name]?1:0;
    if(have+haveGear<ing.qty) return false;
  }
  return true;
}

function consumeIngredients(recipe){
  for(const ing of recipe.ingredients){
    // consume from auras first, then items, then gears
    let need=ing.qty;
    if(S.owned_auras[ing.name]){
      const take=Math.min(need,S.owned_auras[ing.name]);
      S.owned_auras[ing.name]-=take; need-=take;
      if(S.owned_auras[ing.name]<=0) delete S.owned_auras[ing.name];
    }
    if(need>0&&S.owned_items[ing.name]){
      const take=Math.min(need,S.owned_items[ing.name]);
      S.owned_items[ing.name]-=take; need-=take;
      if(S.owned_items[ing.name]<=0) delete S.owned_items[ing.name];
    }
    if(need>0&&S.owned_gears[ing.name]){
      delete S.owned_gears[ing.name];
      if(S.equipped_R===ing.name) S.equipped_R=null;
      if(S.equipped_L===ing.name) S.equipped_L=null;
    }
  }
}

function getIngredientHave(name){
  return (S.owned_auras[name]||0)+(S.owned_items[name]||0)+(S.owned_gears[name]?1:0);
}

let shopTab=0;
function openShop(){
  shopTab=0;

  renderTabBar(["⚔️ Gears","🧪 Potions","✨ Auras"],t=>{shopTab=t;renderCraftItems();});

function renderCraftItems(){
  const c=document.getElementById("overlay-content");c.innerHTML="";
  const recipes=shopTab===0?GEAR_RECIPES:shopTab===1?POTION_RECIPES:AURA_RECIPES;

  recipes.forEach(rec=>{
    const name=rec.gear||rec.name||rec.aura;
    const can=canCraft(rec);
    const owned=shopTab===0?S.owned_gears[name]:S.owned_items[name]>0;
    const card=document.createElement("div");card.className="card";
    card.style.borderColor=can?"rgba(60,200,60,0.5)":"rgba(255,255,255,0.08)";
    if(can) card.style.background="rgba(60,200,60,0.06)";

    // ingredient list
    const ingHtml=rec.ingredients.map(ing=>{
      const have=getIngredientHave(ing.name);
      const ok=have>=ing.qty;
      return `<span style="font-size:9px;color:${ok?"#60e880":"#ff6060"}">${ing.qty}× ${ing.name} (${have})</span>`;
    }).join('<br/>');

    card.innerHTML=`
      ${owned?`<span class="owned-tag">✓</span>`:""}
      <div class="card-name" style="color:${can?"#60e880":"#aaa"}">${name}</div>
      <div class="card-sub" style="margin-bottom:6px">${rec.desc||""}</div>
      <div style="border-top:1px solid rgba(255,255,255,0.08);padding-top:5px">${ingHtml}</div>
      <button style="margin-top:8px;width:100%;padding:6px;background:${can?"rgba(60,200,60,0.2)":"rgba(255,255,255,0.05)"};border:1px solid ${can?"rgba(60,200,60,0.4)":"rgba(255,255,255,0.1)"};border-radius:6px;color:${can?"#60e880":"#555"};font-family:inherit;font-size:10px;cursor:pointer;letter-spacing:1px;">${can?"⚒️ CRAFT":"❌ MISSING"}</button>
    `;
    card.querySelector("button").onclick=(e)=>{
      e.stopPropagation();
      if(!can){toast("❌ Missing ingredients!");return;}
      consumeIngredients(rec);
      if(shopTab===2){
        // aura craft
        const auraName=rec.aura;
        S.owned_auras[auraName]=(S.owned_auras[auraName]||0)+1;
        if(!S.collection[auraName]) S.collection[auraName]={count:0,unlocked:true};
        S.collection[auraName].count=(S.collection[auraName].count||0)+1;
        const auraData=AURAS.find(a=>a[0]===auraName);
        if(auraData){
          S.lastAura={name:auraName,chance:auraData[1],col:auraData[2],glow:auraData[3],tier:auraTier(auraData[1]),isBonus:false,crafted:true};
          updateAuraDisplay();
          // play cutscene if rare enough
          if(auraTier(auraData[1])>=3) playCutscene(auraData,auraTier(auraData[1]));
          else if(auraData[1]>=10000) playStarCutscene(auraData,auraTier(auraData[1]));
        }
        toast(`✨ Crafted: ${auraName}! Added to storage.`);
      } else if(shopTab===0){
        // gear
        S.owned_gears[name]=true;
        const gearDef=GEARS.find(g=>g&&g.name===name);
        if(gearDef){gearDef.hand==="R"?S.equipped_R=name:S.equipped_L=name;}
        if(name==="Gear Basing"){S.owned_items["Gear Basing"]=(S.owned_items["Gear Basing"]||0)+1;}
        toast(`✅ Crafted: ${name}!`);
      } else {
        // potion or item — add to owned_items inventory
        S.owned_items[name]=(S.owned_items[name]||0)+1;
        toast(`🧪 Crafted: ${name}! Check Items tab.`);
      }
      updateHUD();save();renderCraftItems();
    };
    c.appendChild(card);
  });
}

//  INVENTORY  (equip gear/talisman, use potions)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let invTab=0;

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  USE POTION  (stacking logic)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function usePotion(rec){
  const isRoll=rec.dur<=1;
  const isRollBased=rec.rollsLeft!==undefined; // Warp/Transcendent
  const existing=S.active_potions.find(p=>p.name===rec.name);
  if(existing){
    if(isRoll) return toast(`❌ ${rec.name} is already active!`);
    if(isRollBased) existing.rollsLeft=(existing.rollsLeft||0)+rec.rollsLeft;
    else existing.timer+=rec.dur*1000;
    toast(`🧪 ${rec.name} extended!`);
  } else {
    const entry={
      name:rec.name,
      luck_add:rec.luck_add||0,
      speed_add:rec.speed_add||0,
      isRoll,
      timer:isRoll?999999:rec.dur*1000,
    };
    if(isRollBased) entry.rollsLeft=rec.rollsLeft; // carry over rollsLeft
    S.active_potions.push(entry);
    toast(`🧪 ${rec.name} active!`);
  }
  updateHUD();save();
}

function useItem(name){
  if(name==="Strange Controller"||name==="Biome Randomizer"){
    let bi;
    // 1/5000 chance to get Cyberspace (rare, controller-only)
    if(rnd()<1/5000){
      bi=BIOMES.findIndex(b=>b.name==="Cyberspace");
    } else {
      // Weighted pick from non-rare biomes with controllerWeight>0
      const pool=BIOMES.map((b,i)=>({i,w:b.controllerWeight||0})).filter(x=>x.w>0);
      const total=pool.reduce((s,x)=>s+x.w,0);
      let rv=rnd()*total; bi=pool[0].i;
      for(const x of pool){rv-=x.w;if(rv<=0){bi=x.i;break;}}
    }
    S.biomeIdx=bi; S.biomeTimer=BIOMES[bi].dur;
    updateBiomeBar();
    const b=BIOMES[bi];
    if(b.item){
      const qty=b.itemQty+(b.itemQty>1?Math.floor(rnd()*3):0);
      S.owned_items[b.item]=(S.owned_items[b.item]||0)+qty;
      toast(`${b.emoji} ${b.name}! Got ${qty}x ${b.item}!`);
    } else {
      toast(`${b.emoji} Forced biome: ${b.name}!`);
    }
    if(name==="Strange Controller"){
      S.owned_items["Strange Controller"]=(S.owned_items["Strange Controller"]||0)-1;
      if(S.owned_items["Strange Controller"]<=0) delete S.owned_items["Strange Controller"];
    }
    save(); updateHUD(); if(typeof renderInventoryTab==='function') renderInventoryTab();
  }
}

function renderTabBar(tabs,onSwitch){
  const bar=document.getElementById("tab-bar");bar.innerHTML="";

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  GLOVE DISPLAY
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function rRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function drawGlove(ctx, x, y, size, col, isLeft, squeeze){
  const r=col[0],g=col[1],b=col[2];
  const bright=`rgba(${Math.min(255,r+60)},${Math.min(255,g+60)},${Math.min(255,b+60)},1)`;
  const mid=`rgba(${r},${g},${b},0.85)`;
  const dark=`rgba(${Math.max(0,r-50)},${Math.max(0,g-50)},${Math.max(0,b-50)},0.9)`;
  const glow=`rgba(${r},${g},${b},0.25)`;

  ctx.save();
  ctx.translate(x,y);
  if(isLeft) ctx.scale(-1,1);
  ctx.translate(squeeze*size*0.1,0);

  const S=size*1.3; // 30% bigger than before

  // ── Drop shadow / glow behind glove ──────────────────────────
  ctx.shadowColor=`rgba(${r},${g},${b},0.5)`;
  ctx.shadowBlur=S*0.4;

  // ── CUFF ─────────────────────────────────────────────────────
  const cuffGrad=ctx.createLinearGradient(-S*0.3,S*0.18,S*0.3,S*0.6);
  cuffGrad.addColorStop(0,bright);
  cuffGrad.addColorStop(0.4,mid);
  cuffGrad.addColorStop(1,dark);
  rRect(ctx,-S*0.3,S*0.18,S*0.6,S*0.5,S*0.12);
  ctx.fillStyle=cuffGrad; ctx.fill();
  // Cuff highlight band
  rRect(ctx,-S*0.3,S*0.18,S*0.6,S*0.12,S*0.06);
  ctx.fillStyle=`rgba(${Math.min(255,r+100)},${Math.min(255,g+100)},${Math.min(255,b+100)},0.5)`;
  ctx.fill();
  // Cuff outline
  rRect(ctx,-S*0.3,S*0.18,S*0.6,S*0.5,S*0.12);
  ctx.strokeStyle=bright; ctx.lineWidth=1.5; ctx.stroke();

  ctx.shadowBlur=0;

  // ── PALM ──────────────────────────────────────────────────────
  const palmGrad=ctx.createRadialGradient(-S*0.06,-S*0.06,S*0.02,0,0,S*0.38);
  palmGrad.addColorStop(0,bright);
  palmGrad.addColorStop(0.5,mid);
  palmGrad.addColorStop(1,dark);
  ctx.beginPath();
  ctx.ellipse(0,S*0.02,S*0.32,S*0.4,0,0,Math.PI*2);
  ctx.fillStyle=palmGrad; ctx.fill();
  ctx.strokeStyle=bright; ctx.lineWidth=1.5; ctx.stroke();

  // Palm inner highlight
  ctx.beginPath();
  ctx.ellipse(-S*0.06,-S*0.06,S*0.12,S*0.1,0.3,0,Math.PI*2);
  ctx.fillStyle=`rgba(${Math.min(255,r+120)},${Math.min(255,g+120)},${Math.min(255,b+120)},0.2)`;
  ctx.fill();

  // ── FINGERS ───────────────────────────────────────────────────
  const fDefs=[
    {ox:-S*0.215,oy:-S*0.3,angle:-0.22,fw:S*0.13,fh:S*0.34},
    {ox:-S*0.07, oy:-S*0.34,angle:-0.06,fw:S*0.135,fh:S*0.38},
    {ox: S*0.075,oy:-S*0.33,angle: 0.06,fw:S*0.135,fh:S*0.36},
    {ox: S*0.215,oy:-S*0.28,angle: 0.22,fw:S*0.13,fh:S*0.32},
  ];
  fDefs.forEach((f,i)=>{
    ctx.save();
    ctx.translate(f.ox,f.oy);
    ctx.rotate(f.angle);
    const fGrad=ctx.createLinearGradient(-f.fw*0.5,-f.fh,f.fw*0.5,0);
    fGrad.addColorStop(0,bright);
    fGrad.addColorStop(0.5,mid);
    fGrad.addColorStop(1,dark);
    rRect(ctx,-f.fw*0.5,-f.fh,f.fw,f.fh,S*0.07);
    ctx.fillStyle=fGrad; ctx.fill();
    ctx.strokeStyle=bright; ctx.lineWidth=1.2; ctx.stroke();
    // Finger crease lines
    ctx.strokeStyle=`rgba(${Math.max(0,r-30)},${Math.max(0,g-30)},${Math.max(0,b-30)},0.5)`;
    ctx.lineWidth=0.8;
    [-f.fh*0.35,-f.fh*0.65].forEach(cy=>{
      ctx.beginPath();ctx.moveTo(-f.fw*0.35,cy);ctx.lineTo(f.fw*0.35,cy);ctx.stroke();
    });
    ctx.restore();
  });

  // ── THUMB ────────────────────────────────────────────────────
  ctx.save();
  ctx.translate(-S*0.32,-S*0.04);
  ctx.rotate(-0.55);
  const tGrad=ctx.createLinearGradient(-S*0.08,-S*0.22,S*0.08,0);
  tGrad.addColorStop(0,bright); tGrad.addColorStop(1,dark);
  rRect(ctx,-S*0.075,-S*0.24,S*0.15,S*0.26,S*0.07);
  ctx.fillStyle=tGrad; ctx.fill();
  ctx.strokeStyle=bright; ctx.lineWidth=1.2; ctx.stroke();
  ctx.restore();

  // ── KNUCKLE RIDGES ───────────────────────────────────────────
  fDefs.forEach((f,i)=>{
    if(i===3) return;
    const kx=(fDefs[i].ox+fDefs[i+1].ox)*0.5;
    ctx.beginPath();
    ctx.arc(kx,-S*0.28,S*0.04,0,Math.PI*2);
    ctx.fillStyle=bright; ctx.fill();
  });

  ctx.restore();
}

// Color map for each gear
const GEAR_COLORS={
  "Luck Glove":[40,160,40],"Desire Glove":[80,180,80],"Solar Device":[255,180,0],
  "Lunar Device":[160,160,255],"Shining Star":[255,240,100],"Eclipse Device":[255,140,0],
  "Exo Gauntlet":[0,200,160],"Jackpot Gauntlet":[255,215,0],"Frozen Gauntlet":[160,220,255],
  "Windstorm Device":[180,210,255],"Subzero Device":[100,200,255],"Galactic Device":[80,0,200],
  "Volcanic Device":[255,80,0],"Exoflex Device":[0,255,160],"Hologrammer":[0,200,255],
  "Ragnaröker":[200,0,100],"Starshaper":[255,220,80],"Neuralyzer":[0,255,200],
  "Genesis Drive":[255,255,255],"Heavenly Device":[255,240,160],
  "Jackpot Gauntlet (L)":[255,215,0],"Gemstone Gauntlet":[100,200,200],
  "Tide Gauntlet":[0,160,220],"Flesh Device":[200,80,80],
  "Blessed Tide Gauntlet":[0,200,255],"Gravitational Device":[100,0,255],
};

function drawGloves(ctx, cx, cy, r, ts){
  if(!S.lastAura) return;
  const squeeze=Math.sin(ts*2.5)*0.3+0.5; // breathing squeeze toward orb
  const size=r*0.72;
  const offset=r*1.7;

  if(S.equipped_R){
    const col=GEAR_COLORS[S.equipped_R]||[200,200,200];
    drawGlove(ctx, cx+offset, cy, size, col, false, squeeze);
  }
  if(S.equipped_L){
    const col=GEAR_COLORS[S.equipped_L]||[160,160,255];
    drawGlove(ctx, cx-offset, cy, size, col, true, squeeze);
  }
}

// Called from draw() after orb is drawn
function drawAuraEffect(ctx,name,cx,cy,r,ts){
  const fn=AURA_EFFECTS[name];
  if(!fn)return;
  ctx.save();
  try{fn(ctx,cx,cy,r,ts);}catch(e){}
  ctx.restore();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  MAIN DRAW
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function draw(t){
  const W=bgC.width,H=bgC.height;
  bgX.fillStyle="#08081A";bgX.fillRect(0,0,W,H);
  // stars
  const ts=t/1000;
  for(const s of STARS){
    const a=0.25+0.4*Math.sin(ts*s.s+s.x*9);
    bgX.beginPath();bgX.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
    bgX.fillStyle=rgba([255,255,255],a);bgX.fill();
  }
  // biome tint
  if(S.biomeIdx>0){
    bgX.fillStyle=rgba(BIOMES[S.biomeIdx].color,0.05);bgX.fillRect(0,0,W,H);
  }
  // particles
  S.particles=S.particles.filter(p=>p.life>0);
  if(S.particles.length>120)S.particles=S.particles.slice(-120);
  S.particles.forEach(p=>{p.tick();p.draw(bgX);});
  // aura orb — bigger, with name rendered inside
  if(S.lastAura){
    const {name,col,glow,tier,isBonus}=S.lastAura;
    const cx=W/2,cy=H*0.42;
    const r=58+tier*10+Math.sin(ts*2.2)*6;
    // outer glow halo
    const g=bgX.createRadialGradient(cx,cy,0,cx,cy,r*2.8);
    g.addColorStop(0,rgba(glow,0.9));g.addColorStop(0.35,rgba(col,0.5));g.addColorStop(0.7,rgba(col,0.15));g.addColorStop(1,rgba(col,0));
    bgX.beginPath();bgX.arc(cx,cy,r*2.8,0,Math.PI*2);bgX.fillStyle=g;bgX.fill();
    // orb core
    const inner=bgX.createRadialGradient(cx,cy-r*0.2,r*0.1,cx,cy,r);
    inner.addColorStop(0,rgba([255,255,255],0.9));
    inner.addColorStop(0.4,rgba(glow,0.85));
    inner.addColorStop(1,rgba(col,0.6));
    bgX.beginPath();bgX.arc(cx,cy,r,0,Math.PI*2);bgX.fillStyle=inner;bgX.fill();
    // aura name on orb
    const maxW=r*1.8;
    const nameFontSize=Math.max(11,Math.min(22,r*0.38));
    bgX.save();
    bgX.font=`bold ${nameFontSize}px 'Courier New'`;
    bgX.textAlign='center';bgX.textBaseline='middle';
    bgX.shadowBlur=10;bgX.shadowColor=rgba(col,0.9);
    bgX.fillStyle='rgba(255,255,255,0.95)';
    // word-wrap name if needed
    const words=name.split(' ');
    let lines=[],cur='';
    for(const w of words){
      const test=cur?cur+' '+w:w;
      if(bgX.measureText(test).width>maxW&&cur){lines.push(cur);cur=w;}
      else cur=test;
    }
    if(cur) lines.push(cur);
    const lh=nameFontSize*1.2;
    const startY=cy-(lines.length-1)*lh/2;
    lines.forEach((l,i)=>bgX.fillText(l,cx,startY+i*lh));
    bgX.shadowBlur=0;bgX.restore();
    // Unique aura effect
    // Draw equipped gloves on sides of orb (behind aura effects)
    drawGloves(bgX,cx,cy,r,ts);
    drawAuraEffect(bgX,name,cx,cy,r,ts);
  }
  // cooldown bar handled by visual loop
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  ROLLING ENGINE  (setInterval — works in all contexts)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// We use a plain setInterval instead of a Worker.
// When the tab is visible: runs at full speed.
// When hidden: browsers throttle to ~1Hz but it still fires,
//   so we use Date.now() delta to calculate how many rolls
//   should have happened and catch them all up at once.

let lastTickTime=Date.now();
let bgRollsWhileAway=0;
let _rollTick=null;

function startBgWorker(){
  if(_rollTick) return;
  lastTickTime=Date.now();
  _rollTick=setInterval(gameTick, 100); // 100ms ticks
}

function stopBgWorker(){
  if(_rollTick){clearInterval(_rollTick);_rollTick=null;}
}

// Called every 100ms (or ~1s when tab hidden)
function gameTick(){
  const now=Date.now();
  const dt=Math.min(now-lastTickTime, 5000); // cap at 5s to avoid huge catch-ups on re-focus
  lastTickTime=now;

  S.rollInterval=calcSpeed();

  // Potion timers (array — each potion ticks independently)
  if(S.active_potions.length>0){
    let expired=[];
    S.active_potions=S.active_potions.filter(p=>{
      if(p.rollsLeft!==undefined) return true; // roll-based — timer not used, managed in doRoll
      p.timer-=dt;
      if(p.timer<=0){
        if(!document.hidden) toast(`🧪 ${p.name} wore off`);
        return false;
      }
      return true;
    });
    if(!document.hidden) updateHUD();
  }

  // ── Timers always run regardless of autoRoll ──
  tickBiome(dt);
  tickPassiveDrops(dt);
  tickDayNight(dt);

  // Roll cooldown
  if(S.rollCooldown>0) S.rollCooldown=Math.max(0, S.rollCooldown-dt);

  if(!S.autoRoll) return;

  if(S.rollCooldown<=0){
    if(document.hidden){
      const missedRolls=Math.max(1, Math.floor(dt/S.rollInterval));
      for(let i=0;i<missedRolls;i++) doBgRoll();
      bgRollsWhileAway+=missedRolls;
    } else if(!csActive&&!starCsActive){
      doRoll();
      S.rollCooldown=S.rollInterval;
    }
  }
}

// Called from endCutscene/endStarCutscene — fires next roll immediately
function onCutsceneDone(){
  if(S.autoRoll) S.rollCooldown=0;
}

// Silent background roll — no visuals, no cutscenes
function doBgRoll(){
  const luck=calcLuck();
  const biome=BIOMES[S.biomeIdx];
  S.rolls++;S.bonusRollCtr++;

  let bonusMult=2;
  if(S.equipped_L==="Jackpot Gauntlet (L)")bonusMult=60;
  else if(S.equipped_L==="Gravitational Device")bonusMult=6;
  else if(S.equipped_L==="Flesh Device")bonusMult=1.3;
  const fleshActive=S.equipped_L==="Flesh Device";
  const isBonus=fleshActive||(S.bonusRollCtr%10===0);
  let gemBonus=0;
  if(S.equipped_L==="Gemstone Gauntlet") gemBonus=Math.floor(rnd()*160);
  const effLuck=(luck+gemBonus)*(isBonus?bonusMult:1);

  let coinMult=1;
  [S.equipped_R,S.equipped_L].forEach(n=>{
    if(!n)return;
    const g=GEARS.find(x=>x&&x.name===n);
    if(g&&g.coin_mult) coinMult=Math.max(coinMult,g.coin_mult);
  });

  const biomeMult=BIOMES[S.biomeIdx].mult;
  const elig=AURAS.filter(a=>!a[4]||a[4]===biome.name);
  const weights=elig.map(a=>{
    const base=(effLuck/100)/a[1];
    let w=(a[4]&&a[4]===biome.name)?base*biomeMult:base;
    if(a[0]==="Solar"&&S.isDay) w*=10;
    if(a[0]==="Lunar"&&!S.isDay) w*=10;
    return w;
  });
  const total=weights.reduce((s,w)=>s+w,0);
  let r=rnd()*total,picked=elig[0];
  for(let i=0;i<elig.length;i++){r-=weights[i];if(r<=0){picked=elig[i];break;}}

  const [name,chance,col,glow]=picked;
  const tier=auraTier(chance);
  S.coins+=Math.round(Math.max(1,Math.floor(Math.log10(chance+1)))*coinMult);
  S.active_potions=S.active_potions.filter(p=>{
    if(p.isRoll) return false;
    if(p.rollsLeft!==undefined){p.rollsLeft--;if(p.rollsLeft<=0)return false;}
    return true;
  });

  if(!S.collection[name]) S.collection[name]={count:0,unlocked:true};
  S.collection[name].count=(S.collection[name].count||0)+1;

  if(!S.autoDelete.includes(name)){
    S.owned_auras[name]=(S.owned_auras[name]||0)+1;
    if(S.autoEquip===name){S.equipped_aura=name;}
    S.lastAura={name,chance,col,glow,tier,isBonus:false};
  }

  tickMerchant();
  S.rollCooldown=S.rollInterval;
  if(S.rolls%60===0) save();
}

//  GAME LOOP  (visuals only — logic runs in worker)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let last=performance.now();
function loop(ts){
  // VISUAL ONLY loop — all game logic (rolling, cooldowns, timers) handled by worker
  last=ts;

  if(!document.hidden){
    // Day/night tick in visual loop too (ensures it runs even without rolling)
    const _now2=performance.now();
    if(typeof _lastDayTick==='undefined') window._lastDayTick=_now2;
    const _dayDt=(_now2-window._lastDayTick)/1000;
    window._lastDayTick=_now2;
    if(_dayDt<2){ // sanity cap
      S.dayNightTimer-=_dayDt;
      if(S.dayNightTimer<=0){S.isDay=!S.isDay;S.dayNightTimer=150;if(!document.hidden)toast(S.isDay?'☀️ Daytime!':'🌙 Nighttime!');}
      // Also tick potion timers
      S.active_potions=S.active_potions.filter(p=>{
        if(p.rollsLeft!==undefined)return true;
        p.timer-=_dayDt*1000;
        if(p.timer<=0){toast('🧪 '+p.name+' wore off');return false;}
        return true;
      });
      // Biome timer
      if(S.biomeIdx>0){
        S.biomeTimer-=_dayDt;
        if(S.biomeTimer<=0){S.biomeIdx=0;updateBiomeBar();}
      }
    }
    const _tb=document.getElementById('time-bar');if(_tb)_tb.textContent=(S.isDay?'☀️ DAY ':'🌙 NIGHT ')+Math.ceil(S.dayNightTimer||0)+'s';
    // Update biome bar timer live every frame
    if(S.biomeIdx>0){const _bb=document.getElementById('biome-bar');const _bm=BIOMES[S.biomeIdx];if(_bb)_bb.textContent=_bm.emoji+' '+_bm.name+' · '+Math.ceil(S.biomeTimer)+'s';}
    // Update potion bar
    // Buff tray — render icon per active potion
    updateBuffTray();
    // Update cooldown bar (convert ms to 0-1 fraction)
    const pct=S.rollInterval>0?Math.max(0,1-(S.rollCooldown/S.rollInterval)):1;
    document.getElementById("coolbar-fill").style.width=(pct*100)+"%";

    tickCutscene();
    tickStarCutscene();
    draw(ts);
  }
  requestAnimationFrame(loop);
}

function updateBuffTray(){
  const tray=document.getElementById("buff-tray");
  if(!tray) return;
  tray.innerHTML="";

  // Day/night buff display
  const isDay=S.isDay;
  const timeDiv=document.createElement("div");
  timeDiv.className="buff-icon";
  timeDiv.style.borderColor=isDay?"rgba(255,200,0,0.4)":"rgba(100,100,255,0.4)";
  const timeRem=Math.ceil(S.dayNightTimer);
  timeDiv.innerHTML="<span class='buff-emoji'>"+(isDay?"☀️":"🌙")+"</span>"+
    "<div class='buff-info'>"+
    "<span class='buff-name'>"+(isDay?"DAYTIME":"NIGHTTIME")+"</span>"+
    "<span class='buff-timer' style='color:"+(isDay?"#ffd700":"#8888ff")+"'>"+timeRem+"s</span>"+
    "</div>";
  tray.appendChild(timeDiv);

  // Equipped glove buffs
  const gearBuffs=[];
  if(S.equipped_R){
    const g=GEARS.find(x=>x&&x.name===S.equipped_R);
    if(g&&(g.luck_add||g.speed_add)){
      const parts=[];
      if(g.luck_add) parts.push('+'+g.luck_add+'% luck');
      if(g.speed_add>0) parts.push('+'+g.speed_add+'% spd');
      if(g.speed_add<0) parts.push(g.speed_add+'% spd');
      const div=document.createElement("div");
      div.className="buff-icon";
      div.style.borderColor="rgba(255,215,0,0.35)";
      div.innerHTML="<span class='buff-emoji'>🧤</span>"+
        "<div class='buff-info'>"+
        "<span class='buff-name' style='color:#ccc'>"+g.name.replace(" Device","").replace(" Gauntlet","").replace(" Glove","")+"</span>"+
        "<span class='buff-timer' style='color:#ffd700'>"+parts.join(' ')+"</span>"+
        "</div>";
      tray.appendChild(div);
    }
  }
  if(S.equipped_L){
    const g=GEARS.find(x=>x&&x.name===S.equipped_L);
    if(g){
      const desc=g.effect||g.name;
      const div=document.createElement("div");
      div.className="buff-icon";
      div.style.borderColor="rgba(180,100,255,0.35)";
      div.innerHTML="<span class='buff-emoji'>🫱</span>"+
        "<div class='buff-info'>"+
        "<span class='buff-name' style='color:#ccc'>"+g.name.replace(" Device","").replace(" Gauntlet","").replace(" (L)","")+"</span>"+
        "<span class='buff-timer' style='color:#c080ff'>"+desc.split('.')[0]+"</span>"+
        "</div>";
      tray.appendChild(div);
    }
  }

  // Active potions
  const POTION_EMOJIS={
    "Lucky Potion":"🍀","Speed Potion":"⚡","Haste Potion I":"🏃","Haste Potion II":"🏃",
    "Haste Potion III":"🏃","Rage Potion":"💢","Diver Potion":"🤿",
    "Fortune I":"🧪","Fortune II":"🧪","Fortune III":"🧪",
    "Fortune Spoid I":"✨","Fortune Spoid II":"✨","Fortune Spoid III":"✨",
    "Lucky Potion L":"🍀","Lucky Potion XL":"🍀","Speed Potion L":"⚡","Speed Potion XL":"⚡",
    "Godly Potion (Zeus)":"⚡","Godly Potion (Poseidon)":"🔱","Godly Potion (Hades)":"💀",
    "Potion of Bound":"🔮","Heavenly Potion":"✨","Godlike Potion":"👑",
    "Oblivion Potion":"🌑","Warp Potion":"⏩","Transcendent Potion":"🌟",
  };

  S.active_potions.forEach(p=>{
    const div=document.createElement("div");
    div.className="buff-icon";
    const isLuck=(p.luck_add||0)>0;
    const isSpeed=(p.speed_add||0)>0;
    div.style.borderColor=isLuck?"rgba(100,200,100,0.4)":"rgba(80,160,255,0.4)";
    const emoji=POTION_EMOJIS[p.name]||"🧪";
    let rem;
    if(p.rollsLeft!==undefined) rem=p.rollsLeft+" rolls";
    else if(p.isRoll) rem="1 roll";
    else rem=Math.max(0,Math.ceil(p.timer/1000))+"s";
    const statTxt=isLuck?"+"+p.luck_add+"%":isSpeed?"+"+p.speed_add+"% spd":"";
    const shortName=p.name.replace(" Potion","").replace("Fortune ","F").replace("Haste ","H").replace("Godly ","G").replace("Transcendent","Trans").replace("Oblivion","Obliv");
    div.innerHTML="<span class='buff-emoji'>"+emoji+"</span>"+
      "<div class='buff-info'>"+
      "<span class='buff-name' title='"+p.name+"'>"+shortName+(statTxt?" "+statTxt:"")+"</span>"+
      "<span class='buff-timer' style='color:"+(isLuck?"#60e880":"#60a0ff")+"'>"+rem+"</span>"+
      "</div>";
    tray.appendChild(div);
  });
}

//  DAY / NIGHT SYSTEM
//  Day/night switches every 150s (2.5 min, wiki accurate)
//  Solar exclusive to DAYTIME, Lunar exclusive to NIGHTTIME
//  Both get 10x spawn weight boost in their time period
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// (S.isDay and S.dayNightTimer added to state)
function tickDayNight(dt){
  S.dayNightTimer-=dt/1000;
  if(S.dayNightTimer<=0){
    S.isDay=!S.isDay;
    S.dayNightTimer=150; // 2.5 minutes
    const timeBar=document.getElementById("time-bar");
    if(timeBar){
      timeBar.textContent=S.isDay?"☀️ DAY":"🌙 NIGHT";
      timeBar.style.color=S.isDay?"#ffd700":"#8888ff";
      timeBar.style.borderColor=S.isDay?"rgba(255,200,0,0.35)":"rgba(100,100,255,0.35)";
    }
    if(!document.hidden) toast(S.isDay?"☀️ Daytime — Solar boost active!":"🌙 Nighttime — Lunar boost active!");
  }
}

function initDayNight(){
  // Already in state via save/load, but set defaults if missing
  if(S.isDay===undefined) S.isDay=true;
  if(!S.dayNightTimer||S.dayNightTimer<=0) S.dayNightTimer=150;
  const timeBar=document.getElementById("time-bar");
  if(timeBar){
    timeBar.textContent=S.isDay?"☀️ DAY":"🌙 NIGHT";
    timeBar.style.color=S.isDay?"#ffd700":"#8888ff";
  }
}

const COMP_WEIGHTS={Common:60, Rare:30, Epic:10};

function weightedRoulettePick(items, weightFn){
  const total=items.reduce((s,x)=>s+weightFn(x),0);
  let r=rnd()*total;
  for(const x of items){r-=weightFn(x);if(r<=0)return x;}
  return items[items.length-1];
}

// Draws a spinning horizontal roulette strip then lands on result
function animateRoulette(containerId, items, displayFn, onLand, isSVG=false){
  const container=document.getElementById(containerId);
  if(!container)return;
  container.innerHTML="";

  // Build strip — 40 items cycling, last ~6 are the target
  const ITEM_W=60, VISIBLE=7;
  const picked=onLand(); // decide result first
  const stripItems=[];
  for(let i=0;i<34;i++) stripItems.push(items[Math.floor(rnd()*items.length)]);
  // last 6 lead into result
  for(let i=0;i<5;i++) stripItems.push(items[Math.floor(rnd()*items.length)]);
  stripItems.push(picked);

  const strip=document.createElement("div");
  strip.style.cssText="display:flex;gap:4px;transition:none;will-change:transform;";
  stripItems.forEach(item=>{
    const cell=document.createElement("div");
    cell.style.cssText="width:"+ITEM_W+"px;height:"+ITEM_W+"px;flex-shrink:0;background:rgba(255,255,255,0.07);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;border:2px solid rgba(255,255,255,0.1);overflow:hidden;";
    if(isSVG) cell.innerHTML=displayFn(item);
    else cell.textContent=displayFn(item);
    strip.appendChild(cell);
  });

  const wrapper=document.createElement("div");
  wrapper.style.cssText="overflow:hidden;width:"+(VISIBLE*(ITEM_W+4))+"px;margin:0 auto;position:relative;border-radius:10px;border:2px solid rgba(255,255,255,0.15);background:rgba(0,0,0,0.4);";
  // Center marker
  const marker=document.createElement("div");
  marker.style.cssText="position:absolute;top:0;bottom:0;left:50%;transform:translateX(-50%);width:4px;background:rgba(255,200,0,0.8);z-index:2;border-radius:2px;pointer-events:none;";
  wrapper.appendChild(strip);
  wrapper.appendChild(marker);
  container.appendChild(wrapper);

  // Animate: start offset so center shows item 0, scroll to show result at center
  const centerOffset=Math.floor(VISIBLE/2);
  const totalItems=stripItems.length;
  const targetIdx=totalItems-1; // last item is result
  const startX=0;
  const endX=(targetIdx-centerOffset)*(ITEM_W+4);

  let start=null;
  const duration=3200; // ms
  function ease(t){return t<0.5?4*t*t*t:(t-1)*(2*t-2)*(2*t-2)+1;} // ease in-out cubic

  function frame(ts){
    if(!start)start=ts;
    const elapsed=ts-start;
    const progress=Math.min(1,elapsed/duration);
    const x=startX+(endX-startX)*ease(progress);
    strip.style.transform="translateX(-"+x+"px)";
    if(progress<1){requestAnimationFrame(frame);}
    else{
      strip.style.transform="translateX(-"+endX+"px)";
      // highlight winner
      const cells=strip.querySelectorAll("div");
      cells[targetIdx].style.background="rgba(255,200,0,0.25)";
      cells[targetIdx].style.borderColor="rgba(255,200,0,0.8)";
      setTimeout(()=>container.dispatchEvent(new CustomEvent("landed",{detail:picked})),300);
    }
  }
  requestAnimationFrame(frame);
}
